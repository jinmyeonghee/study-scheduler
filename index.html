<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>학습 시간 계산기</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>
body { font-family: Arial; padding:20px; }

table { border-collapse: collapse; width:100%; margin-top:20px; }

th, td {
  border:1px solid #ccc;
  padding:6px;
  text-align:center;
  vertical-align: top;
}

th { background:#f5f5f5; }

.box {
  text-align:left;
  max-height:140px;
  overflow:auto;
  width:180px;
}

label { display:block; font-size:14px; }

.type-day1 { color:green; font-weight:bold; }
.type-day2 { color:orange; font-weight:bold; }
.type-day3 { color:red; font-weight:bold; }

.summary-box {
  margin-top:30px;
  padding:15px;
  border:1px solid #ddd;
}
</style>
</head>

<body>

<h2>1. 데이터 입력</h2>
<input type="file" id="file">
<button onclick="handleFile()">파일 읽기</button>

<h2>2. 소단원 집계 결과</h2>
<table id="summary"></table>

<h2>3. Day 스케줄</h2>
<button onclick="autoSchedule()">🔥 자동 커리큘럼 생성</button>
<button onclick="downloadCSV()">⬇️ 다운로드</button>
<table id="schedule"></table>

<div class="summary-box">
  <h3>📊 전체 요약</h3>
  <div id="finalSummary"></div>
</div>

<script>
let summaryData = [];
let state = JSON.parse(localStorage.getItem('schedule_state') || '{}');

const columns = [
  '개념원리 확인문제','핵심문제','확인문제','핵심문제up','확인문제up',
  '계산력 강화하기','이문시','이문시up','step1','step2','step3','서술형예제','서술형유제'
];

const allKeys = ['concept', ...columns];

function saveState() {
  localStorage.setItem('schedule_state', JSON.stringify(state));
}

function handleFile() {
  const file = document.getElementById('file').files[0];
  if(!file) return alert("파일 선택하세요");

  const reader = new FileReader();
  reader.onload = function(e) {
    const data = new Uint8Array(e.target.result);
    const wb = XLSX.read(data, { type: 'array' });
    const ws = wb.Sheets[wb.SheetNames[0]];
    const json = XLSX.utils.sheet_to_json(ws);
    compute(json);
  };
  reader.readAsArrayBuffer(file);
}

function compute(data) {
  const grouped = {};

  data.forEach(row => {
    const id = row.unit_id;
    if(!id) return;

    if(!grouped[id]) {
      grouped[id] = { concept:0 };
      columns.forEach(c => grouped[id][c] = 0);
    }

    const time = Number(row.duration_ms || 0);

    if(row.video_type == 3) {
      grouped[id].concept += time;
    } else {
      columns.forEach(col => {
        if(row[col]) grouped[id][col] += time;
      });
    }
  });

  summaryData = Object.entries(grouped).map(([unit, val]) => {
    const obj = { unit, concept: val.concept/60000 };
    columns.forEach(c => obj[c] = val[c]/60000);
    return obj;
  });

  renderSummary();
  renderSchedule();
}

function renderSummary() {
  const el = document.getElementById('summary');
  let header = '<tr><th>unit</th><th>개념영상</th></tr>';
  el.innerHTML = header;

  summaryData.forEach(r => {
    el.innerHTML += `<tr><td>${r.unit}</td><td>${r.concept.toFixed(1)}</td></tr>`;
  });
}

// 🔥 스크롤 유지용
let lastScroll = 0;

function handleCheck(el) {
  lastScroll = window.scrollY;

  const unitId = el.dataset.unit;
  const key = el.dataset.key;
  const day = el.dataset.day;

  if(!state[unitId]) state[unitId] = {};

  if(state[unitId][key] === day) delete state[unitId][key];
  else state[unitId][key] = day;

  saveState();
  renderSchedule();

  setTimeout(() => {
    window.scrollTo(0, lastScroll);
  }, 0);
}

function renderCheckboxGroup(unitId, day) {
  return `<div class="box">` +
    allKeys.map(k => {
      if(k !== 'concept' && !summaryData.some(r => r[k] > 0)) return '';
      const checked = state[unitId]?.[k] === day;

      return `
      <label>
        <input type="checkbox"
          data-unit="${unitId}"
          data-key="${k}"
          data-day="${day}"
          ${checked ? 'checked':''}
          onchange="handleCheck(this)">
        ${k === 'concept' ? '개념영상' : k}
      </label>`;
    }).join('') +
  `</div>`;
}

function renderSchedule() {
  const el = document.getElementById('schedule');

  el.innerHTML = `
  <tr>
    <th>unit</th>
    <th>타입</th>
    <th>Day1</th><th>시간</th>
    <th>Day2</th><th>시간</th>
    <th>Day3</th><th>시간</th>
  </tr>`;

  summaryData.forEach(r => {
    el.innerHTML += `<tr>
      <td>${r.unit}</td>
      <td id="type_${r.unit}"></td>
      <td>${renderCheckboxGroup(r.unit,'d1')}</td>
      <td id="t1_${r.unit}"></td>
      <td>${renderCheckboxGroup(r.unit,'d2')}</td>
      <td id="t2_${r.unit}"></td>
      <td>${renderCheckboxGroup(r.unit,'d3')}</td>
      <td id="t3_${r.unit}"></td>
    </tr>`;
  });

  calcAll();
  renderFinalSummary();
}

function calcAll() {
  summaryData.forEach(r => calc(r.unit));
}

function calc(unitId) {
  const map = summaryData.find(r => r.unit == unitId);
  let d1=0,d2=0,d3=0;

  const checked = document.querySelectorAll(`input[data-unit="${unitId}"]:checked`);

  checked.forEach(input => {
    const key = input.dataset.key;
    const day = input.dataset.day;
    if(day==='d1') d1 += map[key]||0;
    if(day==='d2') d2 += map[key]||0;
    if(day==='d3') d3 += map[key]||0;
  });

  document.getElementById(`t1_${unitId}`).innerText = d1.toFixed(1);
  document.getElementById(`t2_${unitId}`).innerText = d2.toFixed(1);
  document.getElementById(`t3_${unitId}`).innerText = d3.toFixed(1);

  updateType(unitId);
}

function updateType(unitId){
  const checked = document.querySelectorAll(`input[data-unit="${unitId}"]:checked`);
  const days = Array.from(checked).map(i=>i.dataset.day);

  let type='-';
  if(days.includes('d3')) type='day3';
  else if(days.includes('d2')) type='day2';
  else if(days.includes('d1')) type='day1';

  const el = document.getElementById(`type_${unitId}`);
  el.innerText = type;
  el.className = `type-${type}`;
}

// 🔥 요약 생성
function renderFinalSummary(){
  let totalDays = 0;

  summaryData.forEach(r=>{
    const checked = document.querySelectorAll(`input[data-unit="${r.unit}"]:checked`);
    const days = new Set(Array.from(checked).map(i=>i.dataset.day));
    totalDays += days.size;
  });

  document.getElementById('finalSummary').innerHTML =
    `총 예상 소요일: <b>${totalDays}일</b>`;
}

// 🔥 다운로드
function downloadCSV(){
  let rows = [['unit','day','내용']];

  summaryData.forEach(r=>{
    const checked = document.querySelectorAll(`input[data-unit="${r.unit}"]:checked`);
    checked.forEach(i=>{
      rows.push([r.unit, i.dataset.day, i.dataset.key]);
    });
  });

  let csv = rows.map(r=>r.join(',')).join('\n');

  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);

  const a = document.createElement('a');
  a.href = url;
  a.download = 'schedule.csv';
  a.click();
}
</script>

</body>
</html>
