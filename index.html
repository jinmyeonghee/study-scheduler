<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>학습 시간 계산기</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>
body { font-family: Arial; padding:20px; }
table { border-collapse: collapse; width:100%; margin-top:20px; }
th, td { border:1px solid #ccc; padding:6px; text-align:center; vertical-align: top; }
.box { text-align:left; max-height:120px; overflow:auto; }
label { display:block; font-size:12px; }
.disabled { opacity:0.3; }
</style>
</head>

<body>

<h2>1. 데이터 입력</h2>
<input type="file" id="file">
<button onclick="handleFile()">파일 읽기</button>

<h2>2. 소단원 집계 결과</h2>
<table id="summary"></table>

<h2>3. Day 스케줄</h2>
<button onclick="autoSchedule()">🔥 자동 커리큘럼 생성</button>
<table id="schedule"></table>

<script>
let summaryData = [];
let state = JSON.parse(localStorage.getItem('schedule_state') || '{}');

const columns = [
  '개념원리 확인문제','핵심문제','확인문제','핵심문제up','확인문제up',
  '계산력 강화하기','이문시','이문시up','step1','step2','step3','서술형예제','서술형유제'
];

const allKeys = ['concept', ...columns];

function saveState() {
  localStorage.setItem('schedule_state', JSON.stringify(state));
}

// ---------------- 파일 읽기 ----------------
function handleFile() {
  const file = document.getElementById('file').files[0];
  if(!file) {
    alert("파일 선택하세요");
    return;
  }

  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = new Uint8Array(e.target.result);
      const wb = XLSX.read(data, { type: 'array' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const json = XLSX.utils.sheet_to_json(ws);

      compute(json);

    } catch(e) {
      console.error(e);
      alert("파일 읽기 실패");
    }
  };

  reader.readAsArrayBuffer(file);
}

// ---------------- 집계 ----------------
function compute(data) {
  const grouped = {};

  data.forEach(row => {
    const id = row.unit_id;
    if(!id) return;

    if(!grouped[id]) {
      grouped[id] = { concept:0 };
      columns.forEach(c => grouped[id][c] = 0);
    }

    const time = Number(row.duration_ms || 0);

    if(row.video_type == 3) {
      grouped[id].concept += time;
    } else {
      columns.forEach(col => {
        if(row[col]) grouped[id][col] += time;
      });
    }
  });

  summaryData = Object.entries(grouped).map(([unit, val]) => {
    const obj = { unit, concept: val.concept/60000 };
    columns.forEach(c => obj[c] = val[c]/60000);
    return obj;
  });

  renderSummary();
  renderSchedule();
}

// ---------------- summary ----------------
function renderSummary() {
  const el = document.getElementById('summary');

  const activeCols = columns.filter(c =>
    summaryData.some(r => r[c] > 0)
  );

  let header = '<tr><th>unit</th><th>개념영상</th>';
  activeCols.forEach(c => header += `<th>${c}</th>`);
  header += '</tr>';

  el.innerHTML = header;

  summaryData.forEach(r => {
    let row = `<tr><td>${r.unit}</td><td>${r.concept.toFixed(1)}</td>`;
    activeCols.forEach(c => row += `<td>${r[c].toFixed(1)}</td>`);
    row += '</tr>';
    el.innerHTML += row;
  });
}

// ---------------- 체크박스 ----------------
function renderCheckboxGroup(unitId, day) {

  const activeKeys = allKeys.filter(k => {
    if(k === 'concept') return true;
    return summaryData.some(r => r[k] > 0);
  });

  return `<div class="box">` +
    activeKeys.map(k => {
      const assignedDay = state[unitId]?.[k];
      const disabled = assignedDay && assignedDay !== day;
      const checked = assignedDay === day;

      return `
      <label class="${disabled ? 'disabled':''}">
        <input type="checkbox"
          ${checked ? 'checked':''}
          ${disabled ? 'disabled':''}
          onchange="handleCheck('${unitId}', '${k}', '${day}')">
        ${k === 'concept' ? '개념영상' : k}
      </label>`;
    }).join('') +
  `</div>`;
}

// ---------------- 체크 처리 ----------------
function handleCheck(unitId, key, day) {
  if(!state[unitId]) state[unitId] = {};

  if(state[unitId][key] === day) {
    delete state[unitId][key];
  } else {
    state[unitId][key] = day;
  }

  saveState();
  updateRow(unitId);
}

// ---------------- row 업데이트 ----------------
function updateRow(unitId){
  const map = summaryData.find(r => r.unit == unitId);
  if(!map) return;

  allKeys.forEach(k=>{
    ['d1','d2','d3'].forEach(day=>{
      const selector = `input[onchange="handleCheck('${unitId}', '${k}', '${day}')"]`;
      const el = document.querySelector(selector);
      if(!el) return;

      const assigned = state[unitId]?.[k];

      el.checked = assigned === day;
      el.disabled = assigned && assigned !== day;
      el.parentElement.classList.toggle('disabled', assigned && assigned !== day);
    });
  });

  calc(unitId);
}

// ---------------- schedule ----------------
function renderSchedule() {
  const el = document.getElementById('schedule');

  el.innerHTML = '<tr><th>unit</th><th>Day1</th><th>시간</th><th>Day2</th><th>시간</th><th>Day3</th><th>시간</th></tr>';

  summaryData.forEach((r) => {
    el.innerHTML += `<tr>
      <td>${r.unit}</td>
      <td>${renderCheckboxGroup(r.unit,'d1')}</td>
      <td id="t1_${r.unit}">0</td>
      <td>${renderCheckboxGroup(r.unit,'d2')}</td>
      <td id="t2_${r.unit}">0</td>
      <td>${renderCheckboxGroup(r.unit,'d3')}</td>
      <td id="t3_${r.unit}">0</td>
    </tr>`;
  });

  calcAll();
}

function calcAll() {
  summaryData.forEach(r => calc(r.unit));
}

function calc(unitId) {
  const map = summaryData.find(r => r.unit == unitId);
  if(!map) return;

  let d1=0,d2=0,d3=0;

  Object.entries(state[unitId] || {}).forEach(([key,day]) => {
    if(day==='d1') d1 += map[key]||0;
    if(day==='d2') d2 += map[key]||0;
    if(day==='d3') d3 += map[key]||0;
  });

  document.getElementById(`t1_${unitId}`).innerText = d1.toFixed(1);
  document.getElementById(`t2_${unitId}`).innerText = d2.toFixed(1);
  document.getElementById(`t3_${unitId}`).innerText = d3.toFixed(1);
}

// ---------------- 자동 커리큘럼 ----------------
function autoSchedule() {
  summaryData.forEach((unit) => {
    const id = unit.unit;
    if(!state[id]) state[id] = {};

    state[id]['concept'] = 'd1';
    state[id]['개념원리 확인문제'] = 'd1';
    state[id]['핵심문제'] = 'd1';
    state[id]['핵심문제up'] = 'd1';

    allKeys.forEach(k => {
      if(!state[id][k]) state[id][k] = 'd2';
    });
  });

  saveState();
  renderSchedule();
}
</script>

</body>
</html>
