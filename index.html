<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>중등기본서 학습시간계산기</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
body{font-family:Arial,sans-serif;padding:24px;background:#fff}
button,select,input{padding:6px 10px;margin:4px}
table{border-collapse:collapse;width:100%;margin-top:16px;font-size:14px}
th,td{border:1px solid #ccc;padding:6px;text-align:center;vertical-align:top}
th{background:#f5f5f5}
.sticky-summary{position:sticky;top:0;z-index:10;background:#fff8dc;border:1px solid #ddd;padding:12px;margin-bottom:20px;font-size:15px}
.control-box{margin:14px 0;padding:12px;border:1px solid #ddd;background:#fafafa}
.day-box{width:210px;max-height:160px;overflow-y:auto;text-align:left;margin:0 auto}
.day-box label{display:block;font-size:14px;line-height:1.6;white-space:nowrap}
.type-day1{color:green;font-weight:bold}
.type-day2{color:orange;font-weight:bold}
.type-day3{color:red;font-weight:bold}
.type-day4{color:#b000b5;font-weight:bold}
.time-ok{background:#e8f5e9}
.time-warn{background:#fff8e1}
.time-over{background:#ffebee;color:red;font-weight:bold}
.time-empty{background:#f2f2f2;color:#999}
.missing{color:red;font-weight:bold}
.small{color:#666;font-size:13px}
</style>
</head>
<body>

<h1>중등기본서 학습시간계산기</h1>

<div class="sticky-summary" id="topSummary">
  파일을 업로드하면 요약이 표시됩니다.
</div>

<h2>1. 데이터 입력</h2>
<input type="file" id="file" accept=".xlsx,.xls">
<button onclick="handleFile()">파일 읽기</button>
<button onclick="resetSchedule()">선택 초기화</button>

<p class="small">
필수 컬럼: unit_id, video_type, duration_ms, 개념원리 확인문제, 핵심문제, 확인문제, 핵심문제up, 확인문제up, 계산력 강화하기, 이문시, 이문시up, step1, step2, step3, 서술형예제, 서술형유제
</p>

<h2>2. 소단원 집계 결과</h2>
<table id="summary"></table>

<h2>3. Day 스케줄</h2>

<div class="control-box">
  <b>하루 기준 시간</b><br>
  <select id="dailyLimit" onchange="refreshAll()">
    <option value="60">60분</option>
    <option value="90" selected>90분</option>
    <option value="120">120분</option>
  </select>

  <br><br>

  <b>자동 분배 옵션</b><br>
  <button onclick="autoScheduleBasic()">기본형 자동분배</button>
  <button onclick="autoScheduleByLimit()">기준시간 맞춤형 자동분배</button>
  <button onclick="downloadCSV()">⬇️ 다운로드</button>
</div>

<table id="schedule"></table>

<h2>4. 커리큘럼 요약</h2>
<div id="curriculumSummary" class="control-box">파일을 업로드하면 계산됩니다.</div>

<script>
let summaryData=[], state={};

const cols=[
'개념원리 확인문제','핵심문제','확인문제','핵심문제up','확인문제up',
'계산력 강화하기','이문시','이문시up','step1','step2','step3','서술형예제','서술형유제'
];

const keys=['concept',...cols];
const days=['d1','d2','d3','d4'];

const basicDay1=[
  'concept',
  '개념원리 확인문제',
  '핵심문제',
  '확인문제',
  '핵심문제up',
  '확인문제up'
];

const label=k=>k==='concept'?'개념영상':k;
const limit=()=>Number(document.getElementById('dailyLimit').value||90);
const save=()=>localStorage.setItem('study_schedule_state',JSON.stringify(state));
const load=()=>state=JSON.parse(localStorage.getItem('study_schedule_state')||'{}');

function resetSchedule(){
  state={};
  localStorage.removeItem('study_schedule_state');
  renderSchedule();
}

function handleFile(){
  const file=document.getElementById('file').files[0];
  if(!file) return alert('파일을 선택해주세요.');

  const reader=new FileReader();
  reader.onload=e=>{
    const data=new Uint8Array(e.target.result);
    const wb=XLSX.read(data,{type:'array'});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const rows=XLSX.utils.sheet_to_json(ws).map(row=>{
      const o={};
      Object.entries(row).forEach(([k,v])=>o[String(k).trim()]=v);
      return o;
    });

    state={};
    localStorage.removeItem('study_schedule_state');
    compute(rows);
  };
  reader.readAsArrayBuffer(file);
}

function compute(rows){
  const grouped={};

  rows.forEach(r=>{
    const unit=String(r.unit_id||'').trim();
    if(!unit) return;

    if(!grouped[unit]){
      grouped[unit]={concept:0,concept_count:0};
      cols.forEach(c=>{
        grouped[unit][c]=0;
        grouped[unit][c+'_count']=0;
      });
    }

    const ms=Number(r.duration_ms||0);
    const type=Number(r.video_type||0);

    if(type===3){
      grouped[unit].concept+=ms;
      grouped[unit].concept_count++;
    }else{
      cols.forEach(c=>{
        if(r[c]){
          grouped[unit][c]+=ms;
          grouped[unit][c+'_count']++;
        }
      });
    }
  });

  summaryData=Object.entries(grouped).map(([unit,v])=>{
    const row={unit,concept:v.concept/60000,concept_count:v.concept_count};
    cols.forEach(c=>{
      row[c]=v[c]/60000;
      row[c+'_count']=v[c+'_count'];
    });
    return row;
  });

  load();
  renderSummary();
  renderSchedule();
}

function activeCols(){
  return cols.filter(c=>summaryData.some(r=>r[c]>0));
}

function activeKeys(row){
  return keys.filter(k=>row[k]>0);
}

function count(row,k){
  return k==='concept' ? row.concept_count||0 : row[k+'_count']||0;
}

function renderSummary(){
  const ac=activeCols();
  let html='<tr><th>unit_id</th><th>개념영상_개수</th><th>개념영상(분)</th>';
  ac.forEach(c=>html+=`<th>${c}_개수</th><th>${c}(분)</th>`);
  html+='<th>총 시간(분)</th></tr>';

  summaryData.forEach(r=>{
    let total=r.concept;
    ac.forEach(c=>total+=r[c]||0);

    html+=`<tr><td>${r.unit}</td><td>${r.concept_count}</td><td>${r.concept.toFixed(1)}</td>`;
    ac.forEach(c=>html+=`<td>${r[c+'_count']}</td><td>${r[c].toFixed(1)}</td>`);
    html+=`<td>${total.toFixed(1)}</td></tr>`;
  });

  document.getElementById('summary').innerHTML=html;
}

function renderChecks(row,day){
  const unit=row.unit;
  let html=`<div class="day-box" id="box_${unit}_${day}">`;

  activeKeys(row).forEach(k=>{
    html+=`
      <label>
        <input type="checkbox"
          data-unit="${unit}"
          data-key="${k}"
          data-day="${day}"
          ${state[unit]?.[k]===day?'checked':''}
          onchange="handleCheck(this)">
        ${label(k)}(${count(row,k)})
      </label>`;
  });

  html+='</div>';
  return html;
}

function renderSchedule(){
  let html=`
  <tr>
    <th>unit_id</th><th>타입</th>
    <th>Day1</th><th>Day1 시간</th>
    <th>Day2</th><th>Day2 시간</th>
    <th>Day3</th><th>Day3 시간</th>
    <th>Day4</th><th>Day4 시간</th>
    <th>미완성</th>
  </tr>`;

  summaryData.forEach(r=>{
    html+=`<tr>
      <td>${r.unit}</td>
      <td id="type_${r.unit}">-</td>
      <td>${renderChecks(r,'d1')}</td><td id="time_d1_${r.unit}">0.0</td>
      <td>${renderChecks(r,'d2')}</td><td id="time_d2_${r.unit}">0.0</td>
      <td>${renderChecks(r,'d3')}</td><td id="time_d3_${r.unit}">0.0</td>
      <td>${renderChecks(r,'d4')}</td><td id="time_d4_${r.unit}">0.0</td>
      <td id="missing_${r.unit}">-</td>
    </tr>`;
  });

  document.getElementById('schedule').innerHTML=html;
  refreshAll();
}

function handleCheck(input){
  const unit=input.dataset.unit;
  const key=input.dataset.key;
  const day=input.dataset.day;

  const scrolls={};
  days.forEach(d=>{
    const box=document.getElementById(`box_${unit}_${d}`);
    if(box) scrolls[d]=box.scrollTop;
  });

  if(!state[unit]) state[unit]={};

  if(state[unit][key]===day) delete state[unit][key];
  else state[unit][key]=day;

  save();
  renderSchedule();

  requestAnimationFrame(()=>{
    days.forEach(d=>{
      const box=document.getElementById(`box_${unit}_${d}`);
      if(box && scrolls[d]!==undefined) box.scrollTop=scrolls[d];
    });
  });
}

function refreshAll(){
  summaryData.forEach(r=>{
    updateTimes(r.unit);
    updateType(r.unit);
    updateMissing(r.unit);
  });
  updateSummaryText();
}

function updateTimes(unit){
  const row=summaryData.find(r=>r.unit==unit);
  if(!row) return;

  days.forEach(d=>{
    let total=0;
    Object.entries(state[unit]||{}).forEach(([k,day])=>{
      if(day===d) total+=row[k]||0;
    });
    setTimeCell(`time_${d}_${unit}`,total);
  });
}

function setTimeCell(id,val){
  const el=document.getElementById(id);
  if(!el) return;

  const l=limit();
  el.innerText=val.toFixed(1);
  el.className='';

  if(val===0) el.classList.add('time-empty');
  else if(val>l) el.classList.add('time-over');
  else if(val>=l*0.7) el.classList.add('time-ok');
  else el.classList.add('time-warn');
}

function unitType(unit){
  const used=Object.values(state[unit]||{});
  if(used.includes('d4')) return 'day4';
  if(used.includes('d3')) return 'day3';
  if(used.includes('d2')) return 'day2';
  if(used.includes('d1')) return 'day1';
  return '-';
}

function updateType(unit){
  const type=unitType(unit);
  const el=document.getElementById(`type_${unit}`);
  if(!el) return;
  el.innerText=type;
  el.className=type!=='-'?`type-${type}`:'';
}

function updateMissing(unit){
  const row=summaryData.find(r=>r.unit==unit);
  const missing=activeKeys(row).filter(k=>!Object.keys(state[unit]||{}).includes(k));
  const el=document.getElementById(`missing_${unit}`);
  if(!el) return;

  if(missing.length===0){
    el.innerText='완료';
    el.className='';
  }else{
    el.innerText=`${missing.length}개 미배정`;
    el.className='missing';
  }
}

function autoScheduleBasic(){
  summaryData.forEach(row=>{
    const unit=row.unit;
    state[unit]={};

    basicDay1.forEach(k=>{
      if(row[k]>0) state[unit][k]='d1';
    });

    keys.forEach(k=>{
      if(row[k]>0 && !state[unit][k]) state[unit][k]='d2';
    });
  });

  save();
  renderSchedule();
}

function autoScheduleByLimit(){
  const l=limit();

  summaryData.forEach(row=>{
    const unit=row.unit;
    state[unit]={};

    let idx=0, sum=0;

    activeKeys(row).forEach(k=>{
      const t=row[k]||0;

      if(sum+t>l && idx<days.length-1){
        idx++;
        sum=0;
      }

      state[unit][k]=days[idx];
      sum+=t;
    });
  });

  save();
  renderSchedule();
}

function dayTime(row,day){
  let total=0;
  Object.entries(state[row.unit]||{}).forEach(([k,d])=>{
    if(d===day) total+=row[k]||0;
  });
  return total;
}

function dayText(row,day){
  const items=[];
  Object.entries(state[row.unit]||{}).forEach(([k,d])=>{
    if(d===day) items.push(`${label(k)}(${count(row,k)})`);
  });
  return items.join(' / ');
}

function updateSummaryText(){
  let totalDays=0, dayCount={day1:0,day2:0,day3:0,day4:0}, over=0, missing=0;

  summaryData.forEach(row=>{
    const type=unitType(row.unit);

    if(type!=='-'){
      dayCount[type]++;
      totalDays+=Number(type.replace('day',''));
    }

    if(activeKeys(row).some(k=>!Object.keys(state[row.unit]||{}).includes(k))) missing++;

    days.forEach(d=>{
      if(dayTime(row,d)>limit()) over++;
    });
  });

  const text=`
    <b>총 예상 소요일:</b> ${totalDays}일 /
    day1 소단원: ${dayCount.day1}개 /
    day2 소단원: ${dayCount.day2}개 /
    day3 소단원: ${dayCount.day3}개 /
    day4 소단원: ${dayCount.day4}개 /
    기준시간 초과: ${over}건 /
    미완성 소단원: ${missing}개
  `;

  document.getElementById('topSummary').innerHTML=text;
  document.getElementById('curriculumSummary').innerHTML=text;
}

function downloadCSV(){
  const rows=[[
    'unit_id','type',
    'day1','day1_time',
    'day2','day2_time',
    'day3','day3_time',
    'day4','day4_time',
    'missing'
  ]];

  let totalDays=0;

  summaryData.forEach(row=>{
    const type=unitType(row.unit);
    if(type!=='-') totalDays+=Number(type.replace('day',''));

    const missing=activeKeys(row)
      .filter(k=>!Object.keys(state[row.unit]||{}).includes(k))
      .map(label);

    rows.push([
      row.unit,
      type,
      dayText(row,'d1'), dayTime(row,'d1').toFixed(1),
      dayText(row,'d2'), dayTime(row,'d2').toFixed(1),
      dayText(row,'d3'), dayTime(row,'d3').toFixed(1),
      dayText(row,'d4'), dayTime(row,'d4').toFixed(1),
      missing.join(' / ')
    ]);
  });

  rows.push([]);
  rows.push(['요약',`총 예상 소요일: ${totalDays}일`]);

  const csv='\ufeff'+rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);

  const a=document.createElement('a');
  a.href=url;
  a.download='study_schedule.csv';
  a.click();

  URL.revokeObjectURL(url);
}
</script>
</body>
</html>
