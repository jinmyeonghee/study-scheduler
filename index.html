<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>학습 시간 계산기</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>
body { font-family: Arial, sans-serif; padding: 24px; background: #fff; }
button, select, input { padding: 6px 10px; margin: 4px; }
table { border-collapse: collapse; width: 100%; margin-top: 16px; font-size: 14px; }
th, td { border: 1px solid #ccc; padding: 6px; text-align: center; vertical-align: top; }
th { background: #f5f5f5; }
.sticky-summary { position: sticky; top: 0; z-index: 10; background: #fff8dc; border: 1px solid #ddd; padding: 12px; margin-bottom: 20px; font-size: 15px; }
.day-box { width: 210px; max-height: 160px; overflow-y: auto; text-align: left; margin: 0 auto; }
.day-box label { display: block; font-size: 14px; line-height: 1.6; white-space: nowrap; }
.type-day1 { color: green; font-weight: bold; }
.type-day2 { color: orange; font-weight: bold; }
.type-day3 { color: red; font-weight: bold; }
.time-ok { background: #e8f5e9; }
.time-warn { background: #fff8e1; }
.time-over { background: #ffebee; color: red; font-weight: bold; }
.time-empty { background: #f2f2f2; color: #999; }
.missing { color: red; font-weight: bold; }
.control-box { margin: 14px 0; padding: 12px; border: 1px solid #ddd; background: #fafafa; }
.small { color: #666; font-size: 13px; }
</style>
</head>

<body>

<h1>학습 시간 계산기</h1>

<div class="sticky-summary" id="topSummary">
  파일을 업로드하면 요약이 표시됩니다.
</div>

<h2>1. 데이터 입력</h2>
<input type="file" id="file" accept=".xlsx,.xls">
<button onclick="handleFile()">파일 읽기</button>
<button onclick="resetSchedule()">선택 초기화</button>

<p class="small">
필수 컬럼: unit_id, video_type, duration_ms, 개념원리 확인문제, 핵심문제, 확인문제, 핵심문제up, 확인문제up, 계산력 강화하기, 이문시, 이문시up, step1, step2, step3, 서술형예제, 서술형유제
</p>

<h2>2. 소단원 집계 결과</h2>
<table id="summary"></table>

<h2>3. Day 스케줄</h2>

<div class="control-box">
  <b>하루 기준 시간</b><br>
  <select id="dailyLimit" onchange="applyDailyLimit()">
    <option value="60">60분</option>
    <option value="90" selected>90분</option>
    <option value="120">120분</option>
  </select>

  <br><br>

  <b>자동 분배 옵션</b><br>
  <button onclick="autoScheduleBasic()">기본형 자동분배</button>
  <button onclick="autoScheduleByLimit()">기준시간 맞춤형 자동분배</button>
  <button onclick="autoScheduleAdvanced()">심화분리형 자동분배</button>
  <button onclick="downloadCSV()">⬇️ 다운로드</button>
</div>

<table id="schedule"></table>

<h2>4. 커리큘럼 요약</h2>
<div id="curriculumSummary" class="control-box">파일을 업로드하면 계산됩니다.</div>

<script>
let summaryData = [];
let state = {};

const columns = [
  '개념원리 확인문제',
  '핵심문제',
  '확인문제',
  '핵심문제up',
  '확인문제up',
  '계산력 강화하기',
  '이문시',
  '이문시up',
  'step1',
  'step2',
  'step3',
  '서술형예제',
  '서술형유제'
];

const allKeys = ['concept', ...columns];

const basicDay1Keys = [
  'concept',
  '개념원리 확인문제',
  '핵심문제',
  '확인문제',
  '핵심문제up',
  '확인문제up'
];

const advancedDay2Keys = [
  '계산력 강화하기',
  '이문시',
  '이문시up',
  'step1',
  'step2',
  'step3',
  '서술형예제',
  '서술형유제'
];

function labelName(key) {
  return key === 'concept' ? '개념영상' : key;
}

function getDailyLimit() {
  return Number(document.getElementById('dailyLimit').value || 90);
}

function applyDailyLimit() {
  updateAllRows();
  updateCurriculumSummary();
}

function saveState() {
  localStorage.setItem('study_schedule_state', JSON.stringify(state));
}

function loadState() {
  state = JSON.parse(localStorage.getItem('study_schedule_state') || '{}');
}

function resetSchedule() {
  state = {};
  localStorage.removeItem('study_schedule_state');
  renderSchedule();
}

function normalizeRow(row) {
  const obj = {};
  Object.entries(row).forEach(([k, v]) => {
    obj[String(k).trim()] = v;
  });
  return obj;
}

function handleFile() {
  const file = document.getElementById('file').files[0];

  if (!file) {
    alert('파일을 선택해주세요.');
    return;
  }

  const reader = new FileReader();

  reader.onload = function(e) {
    const data = new Uint8Array(e.target.result);
    const wb = XLSX.read(data, { type: 'array' });
    const ws = wb.Sheets[wb.SheetNames[0]];

    const raw = XLSX.utils.sheet_to_json(ws);
    const rows = raw.map(normalizeRow);

    state = {};
    localStorage.removeItem('study_schedule_state');

    compute(rows);
  };

  reader.readAsArrayBuffer(file);
}

function compute(data) {
  const grouped = {};

  data.forEach(row => {
    const unitId = String(row.unit_id || '').trim();
    if (!unitId) return;

    if (!grouped[unitId]) {
      grouped[unitId] = { concept: 0, concept_count: 0 };

      columns.forEach(col => {
        grouped[unitId][col] = 0;
        grouped[unitId][`${col}_count`] = 0;
      });
    }

    const durationMs = Number(row.duration_ms || 0);
    const videoType = Number(row.video_type || 0);

    if (videoType === 3) {
      grouped[unitId].concept += durationMs;
      grouped[unitId].concept_count += 1;
    } else {
      columns.forEach(col => {
        if (row[col]) {
          grouped[unitId][col] += durationMs;
          grouped[unitId][`${col}_count`] += 1;
        }
      });
    }
  });

  summaryData = Object.entries(grouped).map(([unit, value]) => {
    const row = {
      unit,
      concept: value.concept / 60000,
      concept_count: value.concept_count
    };

    columns.forEach(col => {
      row[col] = value[col] / 60000;
      row[`${col}_count`] = value[`${col}_count`];
    });

    return row;
  });

  loadState();
  renderSummary();
  renderSchedule();
}

function getActiveColumns() {
  return columns.filter(col => summaryData.some(row => row[col] > 0));
}

function getActiveKeysForUnit(unitRow) {
  return allKeys.filter(key => unitRow[key] > 0);
}

function getCount(row, key) {
  if (key === 'concept') return row.concept_count || 0;
  return row[`${key}_count`] || 0;
}

function renderSummary() {
  const el = document.getElementById('summary');
  const activeCols = getActiveColumns();

  let html = '<tr><th>unit_id</th><th>개념영상_개수</th><th>개념영상(분)</th>';

  activeCols.forEach(col => {
    html += `<th>${col}_개수</th><th>${col}(분)</th>`;
  });

  html += '<th>총 시간(분)</th></tr>';

  summaryData.forEach(row => {
    let total = row.concept;
    activeCols.forEach(col => total += row[col] || 0);

    html += `<tr>
      <td>${row.unit}</td>
      <td>${row.concept_count}</td>
      <td>${row.concept.toFixed(1)}</td>`;

    activeCols.forEach(col => {
      html += `<td>${row[`${col}_count`]}</td><td>${row[col].toFixed(1)}</td>`;
    });

    html += `<td>${total.toFixed(1)}</td></tr>`;
  });

  el.innerHTML = html;
}

function renderCheckboxGroup(unitRow, day) {
  const unitId = unitRow.unit;
  const activeKeys = getActiveKeysForUnit(unitRow);

  let html = `<div class="day-box">`;

  activeKeys.forEach(key => {
    const checked = state[unitId]?.[key] === day ? 'checked' : '';
    const count = getCount(unitRow, key);

    html += `
      <label>
        <input
          type="checkbox"
          data-unit="${unitId}"
          data-key="${key}"
          data-day="${day}"
          ${checked}
          onchange="handleCheck(this)"
        >
        ${labelName(key)}(${count})
      </label>
    `;
  });

  html += `</div>`;
  return html;
}

function renderSchedule() {
  const el = document.getElementById('schedule');

  let html = `
    <tr>
      <th>unit_id</th>
      <th>타입</th>
      <th>Day1</th>
      <th>Day1 시간</th>
      <th>Day2</th>
      <th>Day2 시간</th>
      <th>Day3</th>
      <th>Day3 시간</th>
      <th>미완성</th>
    </tr>
  `;

  summaryData.forEach(row => {
    html += `
      <tr>
        <td>${row.unit}</td>
        <td id="type_${row.unit}">-</td>
        <td>${renderCheckboxGroup(row, 'd1')}</td>
        <td id="time_d1_${row.unit}">0.0</td>
        <td>${renderCheckboxGroup(row, 'd2')}</td>
        <td id="time_d2_${row.unit}">0.0</td>
        <td>${renderCheckboxGroup(row, 'd3')}</td>
        <td id="time_d3_${row.unit}">0.0</td>
        <td id="missing_${row.unit}">-</td>
      </tr>
    `;
  });

  el.innerHTML = html;
  updateAllRows();
  updateCurriculumSummary();
}

function handleCheck(input) {
  const unitId = input.dataset.unit;
  const key = input.dataset.key;
  const day = input.dataset.day;

  if (!state[unitId]) state[unitId] = {};

  if (state[unitId][key] === day) {
    delete state[unitId][key];
  } else {
    state[unitId][key] = day;
  }

  saveState();
  renderSchedule();
}

function updateAllRows() {
  summaryData.forEach(row => updateRow(row.unit));
}

function updateRow(unitId) {
  calculateTimes(unitId);
  updateType(unitId);
  updateMissing(unitId);
}

function calculateTimes(unitId) {
  const unitRow = summaryData.find(row => row.unit == unitId);
  if (!unitRow) return;

  let d1 = 0;
  let d2 = 0;
  let d3 = 0;

  Object.entries(state[unitId] || {}).forEach(([key, day]) => {
    const value = unitRow[key] || 0;

    if (day === 'd1') d1 += value;
    if (day === 'd2') d2 += value;
    if (day === 'd3') d3 += value;
  });

  setTimeCell(`time_d1_${unitId}`, d1);
  setTimeCell(`time_d2_${unitId}`, d2);
  setTimeCell(`time_d3_${unitId}`, d3);
}

function setTimeCell(id, value) {
  const el = document.getElementById(id);
  const limit = getDailyLimit();

  el.innerText = value.toFixed(1);
  el.className = '';

  if (value === 0) el.classList.add('time-empty');
  else if (value > limit) el.classList.add('time-over');
  else if (value >= limit * 0.7) el.classList.add('time-ok');
  else el.classList.add('time-warn');
}

function getUnitType(unitId) {
  const days = Object.values(state[unitId] || {});

  if (days.includes('d3')) return 'day3';
  if (days.includes('d2')) return 'day2';
  if (days.includes('d1')) return 'day1';
  return '-';
}

function updateType(unitId) {
  const type = getUnitType(unitId);
  const el = document.getElementById(`type_${unitId}`);

  el.innerText = type;
  el.className = '';

  if (type !== '-') {
    el.classList.add(`type-${type}`);
  }
}

function updateMissing(unitId) {
  const row = summaryData.find(r => r.unit == unitId);
  const activeKeys = getActiveKeysForUnit(row);
  const assigned = Object.keys(state[unitId] || {});
  const missing = activeKeys.filter(k => !assigned.includes(k));

  const el = document.getElementById(`missing_${unitId}`);

  if (missing.length === 0) {
    el.innerText = '완료';
    el.className = '';
  } else {
    el.innerText = `${missing.length}개 미배정`;
    el.className = 'missing';
  }
}

function autoScheduleBasic() {
  summaryData.forEach(row => {
    const unitId = row.unit;
    state[unitId] = {};

    basicDay1Keys.forEach(key => {
      if (row[key] > 0) state[unitId][key] = 'd1';
    });

    allKeys.forEach(key => {
      if (!state[unitId][key] && row[key] > 0) {
        state[unitId][key] = 'd2';
      }
    });
  });

  saveState();
  renderSchedule();
}

function autoScheduleByLimit() {
  const limit = getDailyLimit();

  summaryData.forEach(row => {
    const unitId = row.unit;
    state[unitId] = {};

    let currentDay = 'd1';
    let currentTime = 0;

    getActiveKeysForUnit(row).forEach(key => {
      const time = row[key] || 0;

      if (currentTime + time > limit && currentDay === 'd1') {
        currentDay = 'd2';
        currentTime = 0;
      } else if (currentTime + time > limit && currentDay === 'd2') {
        currentDay = 'd3';
        currentTime = 0;
      }

      state[unitId][key] = currentDay;
      currentTime += time;
    });
  });

  saveState();
  renderSchedule();
}

function autoScheduleAdvanced() {
  summaryData.forEach(row => {
    const unitId = row.unit;
    state[unitId] = {};

    basicDay1Keys.forEach(key => {
      if (row[key] > 0) state[unitId][key] = 'd1';
    });

    allKeys.forEach(key => {
      if (!state[unitId][key] && row[key] > 0) {
        if (advancedDay2Keys.includes(key)) state[unitId][key] = 'd2';
        else state[unitId][key] = 'd1';
      }
    });
  });

  saveState();
  renderSchedule();
}

function updateCurriculumSummary() {
  let day1Count = 0;
  let day2Count = 0;
  let day3Count = 0;
  let totalDays = 0;
  let overCount = 0;
  let missingCount = 0;

  summaryData.forEach(row => {
    const type = getUnitType(row.unit);
    const activeKeys = getActiveKeysForUnit(row);
    const assigned = Object.keys(state[row.unit] || {});
    const missing = activeKeys.filter(k => !assigned.includes(k));

    if (missing.length > 0) missingCount++;

    if (type === 'day1') {
      day1Count++;
      totalDays += 1;
    } else if (type === 'day2') {
      day2Count++;
      totalDays += 2;
    } else if (type === 'day3') {
      day3Count++;
      totalDays += 3;
    }

    ['d1','d2','d3'].forEach(day => {
      const time = getDayTime(row, day);
      if (time > getDailyLimit()) overCount++;
    });
  });

  const text = `
    <b>총 예상 소요일:</b> ${totalDays}일 /
    day1 소단원: ${day1Count}개 /
    day2 소단원: ${day2Count}개 /
    day3 소단원: ${day3Count}개 /
    기준시간 초과: ${overCount}건 /
    미완성 소단원: ${missingCount}개
  `;

  document.getElementById('curriculumSummary').innerHTML = text;
  document.getElementById('topSummary').innerHTML = text;
}

function getDayText(row, dayKey) {
  const items = [];

  Object.entries(state[row.unit] || {}).forEach(([key, day]) => {
    if (day === dayKey) {
      const count = getCount(row, key);
      items.push(`${labelName(key)}(${count})`);
    }
  });

  return items.join(' / ');
}

function getDayTime(row, dayKey) {
  let total = 0;

  Object.entries(state[row.unit] || {}).forEach(([key, day]) => {
    if (day === dayKey) {
      total += row[key] || 0;
    }
  });

  return total;
}

function downloadCSV() {
  const rows = [['unit_id', 'type', 'day1', 'day1_time', 'day2', 'day2_time', 'day3', 'day3_time', 'missing']];

  let totalDays = 0;

  summaryData.forEach(row => {
    const unitId = row.unit;
    const type = getUnitType(unitId);
    const activeKeys = getActiveKeysForUnit(row);
    const assigned = Object.keys(state[unitId] || {});
    const missing = activeKeys.filter(k => !assigned.includes(k)).map(labelName);

    if (type === 'day1') totalDays += 1;
    else if (type === 'day2') totalDays += 2;
    else if (type === 'day3') totalDays += 3;

    rows.push([
      unitId,
      type,
      getDayText(row, 'd1'),
      getDayTime(row, 'd1').toFixed(1),
      getDayText(row, 'd2'),
      getDayTime(row, 'd2').toFixed(1),
      getDayText(row, 'd3'),
      getDayTime(row, 'd3').toFixed(1),
      missing.join(' / ')
    ]);
  });

  rows.push([]);
  rows.push(['요약', `총 예상 소요일: ${totalDays}일`, `하루 기준 시간: ${getDailyLimit()}분`]);

  const csv = '\ufeff' + rows.map(row =>
    row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(',')
  ).join('\n');

  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);

  const link = document.createElement('a');
  link.href = url;
  link.download = 'study_schedule.csv';
  link.click();

  URL.revokeObjectURL(url);
}
</script>

</body>
</html>
