<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>학습 시간 계산기</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
body { font-family: Arial; padding:20px; }
table { border-collapse: collapse; width:100%; margin-top:20px; }
th, td { border:1px solid #ccc; padding:6px; text-align:center; }
</style>
</head>
<body>

<h2>1. 데이터 입력</h2>
<input type="file" id="file">
<button onclick="handleFile()">파일 읽기</button>

<h2>2. 결과</h2>
<table id="result"></table>

<script>
function handleFile() {
  const file = document.getElementById('file').files[0];
  if(!file) {
    alert("파일 선택하세요");
    return;
  }

  const reader = new FileReader();
  reader.onload = function(e) {
    const data = new Uint8Array(e.target.result);
    const wb = XLSX.read(data, { type: 'array' });
    const ws = wb.Sheets[wb.SheetNames[0]];
    const json = XLSX.utils.sheet_to_json(ws);

    console.log(json); // 🔥 확인용

    render(json);
  };

  reader.readAsArrayBuffer(file);
}

function render(data) {
  const el = document.getElementById("result");
  el.innerHTML = "<tr><th>unit_id</th><th>총 시간(분)</th></tr>";

  const grouped = {};

  data.forEach(row => {
    const id = row.unit_id;
    const time = Number(row.duration_ms || 0) / 60000;

    if(!grouped[id]) grouped[id] = 0;
    grouped[id] += time;
  });

  Object.entries(grouped).forEach(([k,v]) => {
    el.innerHTML += `<tr><td>${k}</td><td>${v.toFixed(1)}</td></tr>`;
  });
}
</script>

</body>
</html>
